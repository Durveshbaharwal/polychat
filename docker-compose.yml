version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: polychat_backend
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./models:/models
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite+aiosqlite:////data/polychat.db
      - VECTOR_INDEX_PATH=/models/faiss.index
      - FAQ_DATA_PATH=/data/faqs.json
      - HF_HOME=/models/huggingface
      - CORS_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: polychat_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
